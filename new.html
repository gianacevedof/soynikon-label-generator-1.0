<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/styles.css" />
    <script
      src="https://kit.fontawesome.com/197e9f07b4.js"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <title>Soynikon | Label Generator</title>
  </head>

  <body>
    <header>
      <div>
        <img
          src="assets/images/logo-1.png"
          alt="Logo for Soynikon Photo Store"
          style="width: 70px"
        />
      </div>
      
      <div>
        <nav>
          <ul>
            <a href="index.html">Home</a>
            <a href="clients.html">Clients</a>
            <a href="new.html">New</a>
          </ul>
        </nav>
      </div>
    </header>

    <section id="new-client">
      <h1>Add a new client</h1>
      <p>Please fill the information below.</p>

      <form action="#" method="post">

        <h3>Name</h3>
        <input type="text" id="name" for="name"><br>
        <label for="first-name">First name</label>

        <input type="text" id="name" for="name"><br>
        <label for="last-name">Last name</label><br>

        <h3>Address</h3>
        <input type="text" id="street-1" for="street-1"><br>
        <label for="street-1">Street Address</label><br>

        <input type="text" id="street-2" for="street-2"><br>
        <label for="street-2">Street Address Line 2</label><br>

        <input type="text" id="city" for="city"><br>
        <label for="city">Street Address Line 2</label>

        <input type="text" id="state" for="state"><br>
        <label for="state">State / Province</label><br>

        <input type="text" id="zipcode" for="zipcode"><br>
        <label for="zipcode">Postal / Zip Code</label>

        <h3>Phone number</h3>
        <input type="text" id="phone-number" for="phone-number"><br>
        <label for="phone-number">Phone Number</label>

        <button type="submit">Add client</button>
        <button type="reset">Reset</button>

      </form>
    </section>

    <footer>
      <p>&#169 2026 Soynikon</p>
      <div>
        <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="#"><i class="fa-brands fa-instagram"></i></a>
        <a href="#"><i class="fa-brands fa-facebook"></i></a>
      </div>
    </footer>

    <script
      src="/assets/js/label_app.js"
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
